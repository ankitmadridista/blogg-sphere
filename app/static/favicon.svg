<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Globe circle -->
  <circle cx="16" cy="16" r="15" fill="#3a7bd5" stroke="#2a5ba5" stroke-width="1"/>
  <!-- Horizontal lines (latitude) -->
  <ellipse cx="16" cy="16" rx="15" ry="6" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  <!-- Vertical center line (longitude) -->
  <ellipse cx="16" cy="16" rx="6" ry="15" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  <!-- Equator line -->
  <line x1="1" y1="16" x2="31" y2="16" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  <!-- Letter B -->
  <text x="16" y="21" font-family="Georgia, serif" font-size="14" font-weight="bold"
        fill="#ffffff" text-anchor="middle">B</text>
</svg>
