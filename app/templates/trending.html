{% extends "base.html" %}

{% block app_content %}
    <h4>🔥 {{ _('Trending Posts') }}</h4>
    <p class="text-muted small">{{ _('Ranked by total likes + comments, all time') }}</p>
    {% if posts %}
        {% for post in posts %}
            {% include '_post.html' %}
        {% endfor %}
    {% else %}
        <p class="text-muted">{{ _('No posts yet.') }}</p>
    {% endif %}
{% endblock %}
