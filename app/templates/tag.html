{% extends "base.html" %}

{% block app_content %}
    <h4><span class="badge bg-secondary">#{{ tag.name }}</span> Posts</h4>
    {% for post in posts %}
        {% include '_post.html' %}
    {% endfor %}
    {% if not posts %}
        <p class="text-muted">No posts with this tag yet.</p>
    {% endif %}
    <nav class="mt-3">
        <ul class="pagination">
            <li class="page-item {% if not prev_url %}disabled{% endif %}">
                <a class="page-link" href="{{ prev_url or '#' }}">&larr; Newer</a>
            </li>
            <li class="page-item {% if not next_url %}disabled{% endif %}">
                <a class="page-link" href="{{ next_url or '#' }}">Older &rarr;</a>
            </li>
        </ul>
    </nav>
{% endblock %}
