{% extends "base.html" %}

{% block app_content %}
<h2>Admin Dashboard</h2>
<div class="row mt-3">
    <div class="col-md-4">
        <div class="card text-center mb-3">
            <div class="card-body">
                <h1 class="display-4">{{ user_count }}</h1>
                <p class="text-muted">Users</p>
                <a href="{{ url_for('admin_users') }}" class="btn btn-primary btn-sm">Manage</a>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-center mb-3">
            <div class="card-body">
                <h1 class="display-4">{{ post_count }}</h1>
                <p class="text-muted">Posts</p>
                <a href="{{ url_for('admin_posts') }}" class="btn btn-primary btn-sm">Manage</a>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-center mb-3">
            <div class="card-body">
                <h1 class="display-4">{{ comment_count }}</h1>
                <p class="text-muted">Comments</p>
                <a href="{{ url_for('admin_comments') }}" class="btn btn-primary btn-sm">Manage</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
