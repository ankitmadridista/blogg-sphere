<table class="table table-hover">
    <tr>
        <td width="70px">
            <a href="{{ url_for('user', username=post.author.username) }}">
                <img src="{{ post.author.avatar(70) }}" />
            </a>
        </td>
        <td>
            <a href="{{ url_for('user', username=post.author.username) }}">
                {{ post.author.username }}
            </a>
            said {{ moment(post.timestamp).fromNow() }}:
            <br>
            <strong>
                <a href="{{ url_for('post_detail', id=post.id) }}">{{ post.title }}</a>
            </strong>
            {{ post.body | markdown | safe }}

            {% if current_user.is_authenticated and current_user.id == post.author.id %}
            <div class="post-actions" style="margin-top:6px;">
                <a href="{{ url_for('edit_post', id=post.id) }}"
                   class="btn btn-xs btn-default">{{ _('Edit') }}</a>
                <button type="button" class="btn btn-xs btn-danger"
                        data-toggle="modal"
                        data-target="#deleteModal{{ post.id }}">{{ _('Delete') }}</button>
            </div>

            <!-- Delete confirmation modal -->
            <div class="modal fade" id="deleteModal{{ post.id }}" tabindex="-1" role="dialog">
                <div class="modal-dialog modal-sm" role="document">
                    <div class="modal-content">
                        <div class="modal-header">
                            <button type="button" class="close" data-dismiss="modal">&times;</button>
                            <h4 class="modal-title">{{ _('Delete post?') }}</h4>
                        </div>
                        <div class="modal-body">
                            {{ _('This action cannot be undone.') }}
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-default"
                                    data-dismiss="modal">{{ _('Cancel') }}</button>
                            <form method="post"
                                  action="{{ url_for('delete_post', id=post.id) }}"
                                  style="display:inline;">
                                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                                <button type="submit" class="btn btn-danger">{{ _('Delete') }}</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
            {% endif %}
        </td>
    </tr>
</table>
